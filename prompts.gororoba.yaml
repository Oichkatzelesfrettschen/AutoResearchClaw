# ALTERNATE REVIEW PERSONAS (not loaded by PromptManager -- documentation only)
# To activate: rename desired block to "peer_review" under stages: above.
# ============================================================================

# peer_review_balanced: balanced three-perspective panel
# peer_review_tank: Silicon Valley VC panel (Shark Tank for research)
# peer_review_bros: tech-bro startup CEO panel
#
# Full text of these personas preserved in git history.
